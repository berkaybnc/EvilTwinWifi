name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: obsidian-server
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          # Create Artifact Registry if not exists
          gcloud artifacts repositories describe images --location=$REGION || \
          gcloud artifacts repositories create images --repository-format=docker --location=$REGION
          
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/images/$SERVICE_NAME:${{ github.sha }} ./server
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/images/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/images/$SERVICE_NAME:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 5000 \
            --memory 2Gi \
            --cpu 1 \
            --set-env-vars "NODE_ENV=production"
